[build]
  publish = "frontend"
  command = "ls -R"

[functions]
  included_files = ["backend/**"]
  directory = "functions"

[[redirects]]
  # Route any /api calls to our serverless backend
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  # Ensure normal routing for our SPA
  from = "/*"
  to = "/index.html"
  status = 200
